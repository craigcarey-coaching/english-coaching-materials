<svg viewBox="0 0 800 720" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2b3a55"/>
    </marker>
    <marker id="arrowL" markerWidth="10" markerHeight="10" refX="2" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M8,0 L0,3 L8,6 Z" fill="#7a5230"/>
    </marker>
    <marker id="arrowR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7a5230"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="720" fill="#fbfaf7"/>
  <text x="40" y="46" font-size="24" font-weight="bold" fill="#1f2937">Time: how English carves up what French merges</text>
  <text x="40" y="72" font-size="14" fill="#6b7280">Ask one of two questions first — "from when / when?" (a point or a box) or "how long?" (a length).</text>

  <!-- ROW 1: SINCE -->
  <g transform="translate(0,110)">
    <text x="40" y="20" font-size="20" font-weight="bold" fill="#2b3a55">SINCE</text>
    <text x="40" y="40" font-size="12" fill="#6b7280">from when?</text>
    <line x1="190" y1="22" x2="540" y2="22" stroke="#2b3a55" stroke-width="2.5" marker-end="url(#arrow)"/>
    <circle cx="205" cy="22" r="6" fill="#2b3a55"/>
    <text x="205" y="48" font-size="12" fill="#374151" text-anchor="middle">2020 / Monday / 9 a.m.</text>
    <text x="540" y="48" font-size="12" fill="#374151" text-anchor="end">NOW</text>
    <text x="600" y="18" font-size="13" fill="#1f2937">A starting <tspan font-weight="bold">POINT</tspan>,</text>
    <text x="600" y="36" font-size="13" fill="#1f2937">still running to now.</text>
  </g>

  <!-- ROW 2: FOR -->
  <g transform="translate(0,200)">
    <text x="40" y="20" font-size="20" font-weight="bold" fill="#7a5230">FOR</text>
    <text x="40" y="40" font-size="12" fill="#6b7280">how long?</text>
    <line x1="205" y1="22" x2="445" y2="22" stroke="#7a5230" stroke-width="2.5" marker-start="url(#arrowL)" marker-end="url(#arrowR)"/>
    <line x1="205" y1="12" x2="205" y2="32" stroke="#7a5230" stroke-width="2.5"/>
    <line x1="445" y1="12" x2="445" y2="32" stroke="#7a5230" stroke-width="2.5"/>
    <text x="325" y="48" font-size="12" fill="#374151" text-anchor="middle">six years / three days</text>
    <text x="600" y="18" font-size="13" fill="#1f2937">A <tspan font-weight="bold">LENGTH</tspan> of time.</text>
    <text x="600" y="36" font-size="13" fill="#1f2937">Pure quantity.</text>
  </g>

  <!-- ROW 3: IN -->
  <g transform="translate(0,290)">
    <text x="40" y="20" font-size="20" font-weight="bold" fill="#1f6f54">IN</text>
    <text x="40" y="40" font-size="12" fill="#6b7280">when? (the slot)</text>
    <rect x="220" y="6" width="230" height="34" rx="8" fill="#e7f1ec" stroke="#1f6f54" stroke-width="2"/>
    <text x="335" y="28" font-size="13" fill="#15503c" text-anchor="middle">May · 2020 · the morning</text>
    <text x="600" y="18" font-size="13" fill="#1f2937">Inside a calendar</text>
    <text x="600" y="36" font-size="13" fill="#1f2937"><tspan font-weight="bold">BOX</tspan>.</text>
  </g>

  <!-- ROW 4: DURING -->
  <g transform="translate(0,380)">
    <text x="40" y="20" font-size="20" font-weight="bold" fill="#8a3b6b">DURING</text>
    <text x="40" y="40" font-size="12" fill="#6b7280">when? (inside it)</text>
    <rect x="220" y="6" width="230" height="34" rx="8" fill="#f3e4ee" stroke="#8a3b6b" stroke-width="2"/>
    <text x="290" y="28" font-size="13" fill="#6b2350" text-anchor="middle">the meeting</text>
    <line x1="390" y1="2" x2="390" y2="44" stroke="#8a3b6b" stroke-width="2.5"/>
    <circle cx="390" cy="23" r="5" fill="#8a3b6b"/>
    <text x="600" y="18" font-size="13" fill="#1f2937">A moment inside a</text>
    <text x="600" y="36" font-size="13" fill="#1f2937">named <tspan font-weight="bold">EVENT</tspan>.</text>
  </g>

  <!-- ROW 5: OVER -->
  <g transform="translate(0,470)">
    <text x="40" y="20" font-size="20" font-weight="bold" fill="#9a6a1f">OVER</text>
    <text x="40" y="40" font-size="12" fill="#6b7280">across what?</text>
    <rect x="220" y="14" width="260" height="26" rx="8" fill="#f6eed9" stroke="#9a6a1f" stroke-width="2"/>
    <text x="350" y="32" font-size="13" fill="#6e4a12" text-anchor="middle">the weekend / the years</text>
    <path d="M222,14 Q350,-18 478,14" fill="none" stroke="#9a6a1f" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="600" y="18" font-size="13" fill="#1f2937">Spread <tspan font-weight="bold">ACROSS</tspan> the</text>
    <text x="600" y="36" font-size="13" fill="#1f2937">whole span (+ change).</text>
  </g>

  <!-- CALLOUT -->
  <g transform="translate(0,560)">
    <rect x="40" y="0" width="720" height="130" rx="12" fill="#fff" stroke="#d6d0c4" stroke-width="1.5"/>
    <text x="60" y="30" font-size="15" font-weight="bold" fill="#1f2937">The French trap: one word does several jobs</text>
    <text x="60" y="58" font-size="14" fill="#374151"><tspan font-weight="bold" fill="#7a5230">depuis</tspan>  →  SINCE (a point)  +  FOR (a length)</text>
    <text x="60" y="82" font-size="14" fill="#374151"><tspan font-weight="bold" fill="#8a3b6b">pendant</tspan>  →  DURING (an event)  +  FOR (a length)  +  OVER (a span)</text>
    <line x1="60" y1="96" x2="740" y2="96" stroke="#e5e1d8" stroke-width="1"/>
    <text x="60" y="118" font-size="13.5" fill="#1f2937" font-style="italic">"I've been here <tspan font-weight="bold">since 2020</tspan>"  =  "I've been here <tspan font-weight="bold">for six years</tspan>"  —  same fact, English forces you to pick the lens.</text>
  </g>
</svg>
